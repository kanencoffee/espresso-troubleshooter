name: YouTube Cache Builder (One-Time Setup)

on:
  workflow_dispatch:
    inputs:
      skip_confirmation:
        description: 'Skip confirmation prompt'
        required: false
        default: 'false'

jobs:
  build-cache:
    name: Build YouTube Cache
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-auth-oauthlib google-auth-httplib2 google-api-python-client youtube-transcript-api

      - name: Run cache builder
        env:
          YOUTUBE_OAUTH_TOKEN: ${{ secrets.YOUTUBE_OAUTH_TOKEN }}
          HOME: /home/runner
        run: |
          set -e
          mkdir -p "$HOME/Downloads"
          echo "$YOUTUBE_OAUTH_TOKEN" > "$HOME/Downloads/kanen_youtube_token.json"
          chmod 600 "$HOME/Downloads/kanen_youtube_token.json"
          cd scripts/youtube-automation
          python3 kanen_youtube_cache_builder.py
          mkdir -p ../../cache-artifacts
          cp "$HOME/Downloads/kanen_youtube_cache.json" ../../cache-artifacts/

      - name: Upload cache artifact
        uses: actions/upload-artifact@v4
        with:
          name: youtube-cache
          path: cache-artifacts/kanen_youtube_cache.json
          retention-days: 90

      - name: Commit cache to repository
        if: success()
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "Kanen YouTube Bot"
          git config user.email "bot@kanencoffee.com"
          HOME=/home/runner
          cp "$HOME/Downloads/kanen_youtube_cache.json" scripts/youtube-automation/
          git add scripts/youtube-automation/kanen_youtube_cache.json
          git commit -m "🔄 Update YouTube cache" || echo "No changes to commit"
          git push origin main

      - name: Report status
        if: success()
        run: |
          echo "✅ Cache build complete!"
          echo "📊 Cache saved to: scripts/youtube-automation/kanen_youtube_cache.json"
          echo "📝 Next step: Run YouTube Caption Analyzer workflow"
